<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phúc Lưu | AI Chat</title>
    <style>
        body { 
            margin: 0; background: #0a0a0c; color: #ffffff; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 20% 30%, rgba(88, 101, 242, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, rgba(0, 136, 204, 0.15) 0%, transparent 40%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 60px 40px; border-radius: 30px; text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            max-width: 450px; width: 90%;
        }

        h1 { margin: 0; font-size: 2.2em; font-weight: 800; letter-spacing: 2px; 
             background: linear-gradient(90deg, #5865F2, #0088cc); 
             -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }
        
        .bio { color: #888; margin: 15px 0 40px 0; font-size: 1em; }

        /* Nút chính */
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        .btn { padding: 15px 25px; text-decoration: none; font-weight: 600; border-radius: 12px;
               display: flex; align-items: center; justify-content: center; gap: 12px; transition: 0.3s; }
        .btn-discord { background: #5865F2; color: white; }
        .btn-tele { background: #0088cc; color: white; }
        .btn:hover { transform: scale(1.03); opacity: 0.9; }

        .footer { position: absolute; bottom: 30px; color: #222; font-size: 0.8em; }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>CHÀO MỪNG BẠN</h1>
        <div class="bio">Minecraft Tech & AI Bot Developer</div>
        
        <div class="btn-group">
            <a href="https://discord.gg/Km5fS7jMF" target="_blank" class="btn btn-discord">JOIN DISCORD</a>
            <a href="https://t.me/Dat1510_bot" target="_blank" class="btn btn-tele">TELEGRAM BOT</a>
        </div>
    </div>

    <div class="footer">© 2026 Phúc Lưu</div>

    <script async src="https://telegram.org/js/telegram-widget.js?22" 
            data-telegram-discussion="your_channel_name_or_bot" 
            data-comments-limit="5" 
            data-color="29B6F6" 
            data-dark="1"></script>
    
    <script src="https://botman.io/chat-widget/widget.js"></script>
    <script>
        var botmanWidget = {
            frameEndpoint: 'chat.html', // Bạn có thể thay link chat bot của bạn vào đây
            chatServer: 'https://dat71.github.io', 
            title: 'Hỏi đáp với Phúc Lưu',
            mainColor: '#0088cc',
            bubbleBackground: '#0088cc',
            aboutText: 'Phúc Lưu AI',
            introMessage: "Chào bạn! Mình là AI của Phúc Lưu. Bạn cần giúp gì không?"
        };
    </script>
    <script src='https://cdn.jsdelivr.net/npm/botman-web-widget@0/build/js/widget.js'></script>

</body>
</html>
