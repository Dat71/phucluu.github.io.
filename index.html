        body { 
            margin: 0; background: #0a0a0c; color: #ffffff; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 20% 30%, rgba(88, 101, 242, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, rgba(0, 136, 204, 0.15) 0%, transparent 40%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 30px; text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            max-width: 400px; width: 90%;
        }

        h1 { margin: 0; font-size: 2.2em; font-weight: 800; letter-spacing: 2px; 
             background: linear-gradient(90deg, #5865F2, #0088cc); 
             -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }

        .desc { color: #888; margin-top: 20px; font-size: 0.9em; }

        /* Nút ở góc trái dưới cùng */
        .bottom-left-buttons {
            position: fixed; bottom: 20px; left: 20px;
            display: flex; gap: 12px; z-index: 999;
        }

        .mini-btn {
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px);
        }
        .btn-ds { background: #5865F2; }
        .btn-tg { background: #0088cc; }
        .mini-btn:hover { transform: translateY(-5px) scale(1.1); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .footer { position: absolute; bottom: 20px; color: #222; font-size: 0.8em; }
    </style>
</head>
