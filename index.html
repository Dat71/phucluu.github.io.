<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phúc Lưu | AI Chat</title>
    <style>
        body { 
            margin: 0; background: #0a0a0c; color: #ffffff; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 20% 30%, rgba(88, 101, 242, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, rgba(0, 136, 204, 0.15) 0%, transparent 40%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 30px; text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            max-width: 400px; width: 85%;
        }

        h1 { margin: 0; font-size: 1.8em; font-weight: 800; letter-spacing: 2px; 
             background: linear-gradient(90deg, #5865F2, #0088cc); 
             -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }

        /* Khu vực chứa khung chat */
        #chat-container {
            margin-top: 20px;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            height: 350px;
            background: rgba(0, 0, 0, 0.2);
        }

        .footer { position: absolute; bottom: 20px; color: #333; font-size: 0.8em; }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>CHÀO MỪNG BẠN</h1>
        
        <div id="chat-container">
            <script async src="https://telegram.org/js/telegram-widget.js?22" 
                data-telegram-login="Dat1510_bot" 
                data-size="large" 
                data-userpic="false" 
                data-auth-url="https://dat71.github.io" 
                data-request-access="write"></script>
            
            <p style="font-size: 0.8em; color: #555; margin-top: 100px;">
                Đang kết nối với @Dat1510_bot...<br>
                (Bạn hãy nhấn nút đăng nhập để bắt đầu chat nhé)
            </p>
        </div>
    </div>

    <div class="footer">© 2026 Phúc Lưu</div>

</body>
</html>
