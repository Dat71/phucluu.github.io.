<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phúc Lưu | AI & Minecraft Developer</title>
    <style>
        /* Giao diện tổng thể */
        body { 
            margin: 0; background: #0f0f0f; color: #e0e0e0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }

        /* Khung nội dung chính */
        .profile-card {
            background: #1a1a1a; padding: 40px; border-radius: 20px;
            border: 1px solid #333; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }
        .profile-card:hover { transform: translateY(-5px); border-color: #0088cc; }

        h1 { color: #0088cc; margin: 0; font-size: 2.5em; letter-spacing: 2px; }
        p { color: #888; margin: 10px 0 25px 0; }

        /* Nút Chat Telegram */
        .tele-btn {
            background: #0088cc; color: white; padding: 15px 30px;
            text-decoration: none; font-weight: bold; border-radius: 50px;
            display: inline-flex; align-items: center; gap: 10px;
            font-size: 1.1em; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0, 136, 204, 0.3);
        }
        .tele-btn:hover {
            background: #00aaff; transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 136, 204, 0.5);
        }

        /* Hiệu ứng vòng tròn trang trí */
        .bg-circle {
            position: absolute; width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(0, 136, 204, 0.1) 0%, transparent 70%);
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="bg-circle"></div>
    
    <div class="profile-card">
        <h1>PHÚC LƯU</h1>
        
        <a href="https://t.me/Dat1510_bot" target="_blank" class="tele-btn">
            <span>💬 CHAT Ở ĐÂY</span>
        </a>
    </div>

    <p style="position: absolute; bottom: 20px; font-size: 0.8em; color: #444;">
        © 2026 Phúc Lưu Portfolio - Powered by Groq AI
    </p>
</body>
</html>
