<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phúc Lưu | Tech Portfolio</title>
    <style>
        /* Hiệu ứng nền di động */
        body { 
            margin: 0; background: #0a0a0c; color: #ffffff; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(88, 101, 242, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 136, 204, 0.15) 0%, transparent 40%);
        }

        /* Thẻ Profile hiệu ứng kính mờ */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
        }

        h1 { margin: 0; font-size: 2.2em; font-weight: 800; letter-spacing: -1px; background: linear-gradient(90deg, #5865F2, #0088cc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #aaa; margin: 15px 0 35px 0; line-height: 1.6; }

        /* Container chứa các nút */
        .btn-group { display: flex; flex-direction: column; gap: 15px; }

        .btn {
            padding: 14px 25px;
            text-decoration: none;
            font-weight: 600;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        /* Nút Discord */
        .btn-discord { background: #5865F2; color: white; border: 1px solid #5865F2; }
        .btn-discord:hover { background: transparent; color: #5865F2; box-shadow: 0 0 20px rgba(88, 101, 242, 0.4); transform: scale(1.03); }

        /* Nút Telegram */
        .btn-tele { background: #0088cc; color: white; border: 1px solid #0088cc; }
        .btn-tele:hover { background: transparent; color: #0088cc; box-shadow: 0 0 20px rgba(0, 136, 204, 0.4); transform: scale(1.03); }

        .footer { position: absolute; bottom: 30px; color: #444; font-size: 0.8em; font-weight: 500; }
    </style>
</head>
